<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempest07 工具集</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      padding: 50px 35px;
      max-width: 550px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.6);
    }
    h1 {
      font-size: 2.2rem; font-weight: 700; margin-bottom: 6px;
      color: #1d1d1f;
    }
    .subtitle {
      color: #6e6e73; font-size: 1rem; margin-bottom: 35px;
    }
    .card {
      display: flex; align-items: center; gap: 16px;
      background: rgba(255,255,255,0.9); border: 1px solid #e8e8ed;
      border-radius: 16px; padding: 22px 20px; margin-bottom: 16px;
      text-decoration: none; color: #1d1d1f;
      transition: all 0.25s ease; cursor: pointer; text-align: left;
    }
    .card:hover {
      background: #fff; transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }
    .card-icon {
      font-size: 2rem; width: 50px; height: 50px;
      border-radius: 12px; background: #f2f2f7;
      display: flex; align-items: center; justify-content: center;
    }
    .card-content h2 { font-size: 1.2rem; margin-bottom: 4px; }
    .card-content p { font-size: 0.85rem; color: #86868b; }
    .coming-soon { opacity: 0.6; pointer-events: none; }
    .badge {
      background: #e8e8ed; color: #6e6e73; font-size: 0.7rem;
      padding: 2px 8px; border-radius: 10px; margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tempest07</h1>
    <p class="subtitle">个人工作台 · 选择一个工具开始</p>

    <a class="card" href="https://trade-record.pages.dev">
      <div class="card-icon">📋</div>
      <div class="card-content">
        <h2>交易记录管理器</h2>
        <p>多窗口记录，跨设备同步，一键导出PDF</p>
      </div>
    </a>

    <div class="card coming-soon">
      <div class="card-icon">🛠️</div>
      <div class="card-content">
        <h2>即将上线 <span class="badge">敬请期待</span></h2>
        <p>新的工具正在开发中，敬请关注</p>
      </div>
    </div>
  </div>
</body>
</html>
